<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/supernova-icon.png" />
    <title>SuperNova Desktop</title>
    <script>
      (function () {
        var theme = "dark";
        try {
          var raw = window.localStorage.getItem("supernova.workbench_v2.ui");
          if (raw) {
            var parsed = JSON.parse(raw);
            var stored = parsed && parsed.state && parsed.state.theme;
            if (stored === "light" || stored === "dark") {
              theme = stored;
            }
          }
        } catch (_) {
          theme = "dark";
        }
        document.documentElement.dataset.snTheme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
